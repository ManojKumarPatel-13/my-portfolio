<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manoj Kumar Patel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    

    <!-- Contact and FAQ Section -->
    <section class="contact-faq" id="contact">
        <div class="contact-faq__inner">

            <!-- Section Heading -->
            <div class="section-head">
                <span class="section-head__tag">// Contact</span>
                <h2 class="section-head__title">Let’s Connect</h2>
                <p class="section-head__text">Got a project, a question, or just want to talk books and code? Pick
                    whichever feels right.</p>
            </div>

            <div class="grid">

                <!-- Left: Contact Form -->
                <div class="console">

                    <div class="console__head">
                        <span class="dot dot--red"></span>
                        <span class="dot dot--amber"></span>
                        <span class="dot dot--green"></span>
                        <span class="console__path">~/contact.sh</span>
                    </div>

                    <div class="console__status">
                        <span class="status-dot"></span>
                        <span class="status-text">Open to freelance work & interesting collabs</span>
                    </div>

                    <form id="contact-form" class="console-form" novalidate>
                        <div class="field">
                            <label for="name">Name</label>
                            <input type="text" id="name" name="name" required autocomplete="name">
                            <span class="field__line"></span>
                            <span class="field__error" id="name-error"></span>
                        </div>

                        <div class="field">
                            <label for="name">Email</label>
                            <input type="email" id="email" name="email" required autocomplete="email">
                            <span class="field__line"></span>
                            <span class="field__error" id="email-error"></span>
                        </div>

                        <div class="field">
                            <label for="name">Message</label>
                            <textarea id="message" name="message" rows="4" required></textarea>
                            <span class="field__line"></span>
                            <span class="field__error" id="message-error"></span>
                        </div>

                        <button type="submit" class="send-btn" id="send-btn">
                            <span class="send-btn__text">Send Message</span>
                            <span class="send-btn__arrow">&rarr;</span>
                        </button>

                        <p class="form-feedback" id="form-feedback" role="status" aria-live="polite"></p>
                    </form>

                    <div class="socials">
                        <span class="socials__label">or find me here</span>
                        <div class="socials__row">
                            <a href="https://github.com/ManojKumarPatel-13" class="social-icon" aria-label="Github" target="_blank" rel="noopener">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                                    <path
                                        d="M12 2C6.5 2 2 6.5 2 12c0 4.4 2.9 8.1 6.9 9.4.5.1.7-.2.7-.5v-1.8c-2.8.6-3.4-1.3-3.4-1.3-.5-1.2-1.1-1.5-1.1-1.5-.9-.6.1-.6.1-.6 1 .1 1.5 1 1.5 1 .9 1.5 2.3 1.1 2.9.8.1-.7.4-1.1.6-1.4-2.3-.3-4.6-1.1-4.6-5 0-1.1.4-2 1-2.7-.1-.3-.5-1.3.1-2.7 0 0 .8-.3 2.7 1a9.4 9.4 0 0 1 5 0c1.9-1.3 2.7-1 2.7-1 .6 1.4.2 2.4.1 2.7.6.7 1 1.6 1 2.7 0 3.9-2.3 4.7-4.6 5 .4.3.7 1 .7 2v3c0 .3.2.6.7.5A10 10 0 0 0 22 12c0-5.5-4.5-10-10-10Z" />
                                </svg>
                            </a>
                            <a href="https://www.linkedin.com/in/manoj-kumar-patel-925597398/" class="social-icon" aria-label="LinkdIn" target="_blank" rel="noopener">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                                    <rect x="3" y="3" width="18" height="18" rx="2" />
                                    <path d="M7 10v7M7 7v.01M12 17v-4.5c0-1.4 1-2.5 2.3-2.5 1.3 0 2.2 1 2.2 2.5V17" />
                                </svg>
                            </a>
                            <a href="#" class="social-icon" aria-label="Instagram" target="_blank" rel="noopener">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                                    <rect x="3" y="3" width="18" height="18" rx="5" />
                                    <circle cx="12" cy="12" r="4" />
                                    <circle cx="17.2" cy="6.8" r="0.6" fill="currentColor" stroke="none" />
                                </svg>
                            </a>
                            <a href="/blog" class="social-icon" aria-label="Blog" target="_blank" rel="noopener">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                                    <path d="M4 4h11l5 5v11H4Z" />
                                    <path d="M14 4v6h6M8 13h8M8 17h5" />
                                </svg>
                            </a>
                        </div>
                    </div>

                </div>

                <!-- Right: FAQ Section -->
                <div class="faq"></div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
